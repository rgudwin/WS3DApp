/*
 * build.gradle - Arquivo de configuração do projeto WS3DApp
 *
 * Este arquivo é lido pelo Gradle, que é a ferramenta responsável por
 * compilar, testar e executar o projeto. Cada seção abaixo configura
 * um aspecto diferente do processo de build.
 */

// --- PLUGINS ---
// Plugins adicionam funcionalidades ao Gradle.
// O plugin 'application' permite compilar e rodar um programa Java
// através dos comandos: ./gradlew build  e  ./gradlew run
plugins {
    id 'application'
}

// --- REPOSITÓRIOS ---
// Repositórios são os locais onde o Gradle vai buscar as dependências
// (bibliotecas externas) declaradas na seção 'dependencies' abaixo.
repositories {
    // Maven Central é o repositório público mais usado no mundo Java
    mavenCentral()
    // JitPack permite usar projetos hospedados no GitHub como dependências
    maven { url = 'https://jitpack.io' }
}

// --- DEPENDÊNCIAS ---
// Dependências são bibliotecas externas que o projeto utiliza.
// O Gradle as baixa automaticamente dos repositórios declarados acima.
dependencies {
    // Biblioteca para testes unitários (só é usada durante os testes,
    // não é incluída no programa final)
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // Guava: biblioteca utilitária do Google com estruturas de dados
    // e funções auxiliares para Java
    implementation 'com.google.guava:guava:31.1-jre'

    // WS3DProxy: biblioteca de comunicação com o ambiente simulado WS3D
    implementation 'com.github.CST-Group:WS3DProxy:0.0.7'
}

// --- TOOLCHAIN JAVA ---
// Define qual versão do Java será usada para compilar e rodar o projeto.
// O Gradle localiza automaticamente o JDK correto instalado na máquina.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

// --- APLICAÇÃO ---
// Configurações do programa Java que será gerado.
application {
    // Classe principal: ponto de entrada do programa (método main)
    mainClass = 'WS3DApp.App'

    // A partir do Java 16, o JDK restringiu chamadas a recursos nativos
    // do sistema operacional. Esta flag libera esse acesso para bibliotecas
    // que ainda não foram atualizadas para as novas regras do Java 25.
    applicationDefaultJvmArgs = ['--enable-native-access=ALL-UNNAMED']
}

// --- TESTES ---
// Configura o Gradle para usar o JUnit Platform ao rodar os testes
// com o comando: ./gradlew test
test {
    useJUnitPlatform()
    jvmArgs '--enable-native-access=ALL-UNNAMED'
}